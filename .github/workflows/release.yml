name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish under (e.g. v0.1.0) - only used for manual runs'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: dotnet test src/RotationAnalysis.Core.Tests/RotationAnalysis.Core.Tests.csproj -c Release

      - name: Publish self-contained build
        run: >
          dotnet publish src/RotationAnalysis.App/RotationAnalysis.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "RotationAnalysisLab-${{ steps.vars.outputs.tag }}-win-x64.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.vars.outputs.tag }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer\Setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            RotationAnalysisLab-${{ steps.vars.outputs.tag }}-win-x64.zip
            dist/RotationAnalysisLab-*-win-x64-Setup.exe
          generate_release_notes: true
