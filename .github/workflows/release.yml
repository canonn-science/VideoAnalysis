name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish under (e.g. v0.1.0) - only used for manual runs'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          dotnet test src/VideoAnalysis.Core.Tests/VideoAnalysis.Core.Tests.csproj -c Release
          dotnet test src/VideoAnalysis.App.Tests/VideoAnalysis.App.Tests.csproj -c Release

      - name: Publish self-contained build
        run: >
          dotnet publish src/VideoAnalysis.App/VideoAnalysis.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.vars.outputs.version }}
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "VideoAnalysisLab-${{ steps.vars.outputs.tag }}-win-x64.zip"

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.vars.outputs.version }}" installer\Setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            VideoAnalysisLab-${{ steps.vars.outputs.tag }}-win-x64.zip
            dist/VideoAnalysisLab-*-win-x64-Setup.exe
          generate_release_notes: true
